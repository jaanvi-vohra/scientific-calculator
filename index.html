<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="calculator" role="main" aria-label="Scientific Calculator">

    <header class="calc-header">
      <span class="calc-label">SCIENTIFIC</span>
    </header>

    <section class="display" aria-label="Calculator Display">
      <div class="display__expression" id="expression" aria-live="polite" aria-label="Expression"></div>
      <input
        class="display__screen"
        id="screen"
        type="text"
        placeholder="0"
        aria-label="Calculator input"
        readonly
      />
    </section>

    <section class="keypad" aria-label="Calculator Buttons">

      <!-- Row 1: Utility -->
      <div class="keypad__row">
        <button class="btn btn--danger"  data-action="backspace"  aria-label="Backspace">⌫</button>
        <button class="btn btn--fn"      data-action="factorial"  aria-label="Factorial">x!</button>
        <button class="btn btn--fn"      data-value="("           aria-label="Open parenthesis">(</button>
        <button class="btn btn--fn"      data-value=")"           aria-label="Close parenthesis">)</button>
        <button class="btn btn--fn"      data-value="%"           aria-label="Modulo">%</button>
        <button class="btn btn--clear"   data-action="clear"      aria-label="All Clear">AC</button>
      </div>

      <!-- Row 2: sin, π, 7 8 9 ÷ -->
      <div class="keypad__row">
        <button class="btn btn--fn"      data-action="sin"        aria-label="Sine">sin</button>
        <button class="btn btn--const"   data-action="pi"         aria-label="Pi">π</button>
        <button class="btn btn--num"     data-value="7"           aria-label="7">7</button>
        <button class="btn btn--num"     data-value="8"           aria-label="8">8</button>
        <button class="btn btn--num"     data-value="9"           aria-label="9">9</button>
        <button class="btn btn--op"      data-value="/"           aria-label="Divide">÷</button>
      </div>

      <!-- Row 3: cos, log, 4 5 6 × -->
      <div class="keypad__row">
        <button class="btn btn--fn"      data-action="cos"        aria-label="Cosine">cos</button>
        <button class="btn btn--fn"      data-action="log"        aria-label="Log base 10">log</button>
        <button class="btn btn--num"     data-value="4"           aria-label="4">4</button>
        <button class="btn btn--num"     data-value="5"           aria-label="5">5</button>
        <button class="btn btn--num"     data-value="6"           aria-label="6">6</button>
        <button class="btn btn--op"      data-value="*"           aria-label="Multiply">×</button>
      </div>

      <!-- Row 4: tan, √, 1 2 3 − -->
      <div class="keypad__row">
        <button class="btn btn--fn"      data-action="tan"        aria-label="Tangent">tan</button>
        <button class="btn btn--fn"      data-action="sqrt"       aria-label="Square Root">√</button>
        <button class="btn btn--num"     data-value="1"           aria-label="1">1</button>
        <button class="btn btn--num"     data-value="2"           aria-label="2">2</button>
        <button class="btn btn--num"     data-value="3"           aria-label="3">3</button>
        <button class="btn btn--op"      data-value="-"           aria-label="Subtract">−</button>
      </div>

      <!-- Row 5: e, x², 0, ., =, + -->
      <div class="keypad__row">
        <button class="btn btn--const"   data-action="euler"      aria-label="Euler's number">e</button>
        <button class="btn btn--fn"      data-action="square"     aria-label="Square">x²</button>
        <button class="btn btn--num"     data-value="0"           aria-label="0">0</button>
        <button class="btn btn--num"     data-value="."           aria-label="Decimal point">.</button>
        <button class="btn btn--equal"   data-action="evaluate"   aria-label="Equals">=</button>
        <button class="btn btn--op"      data-value="+"           aria-label="Add">+</button>
      </div>

    </section>

    <footer class="calc-footer" aria-label="Angle mode toggle">
      <button class="mode-toggle" id="modeToggle" aria-pressed="false" title="Toggle degree/radian mode">
        <span class="mode-label" id="modeLabel">DEG</span>
      </button>
    </footer>

  </main>

  <script src="script.js"></script>
</body>

</html>
